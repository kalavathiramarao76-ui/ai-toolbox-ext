<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9333ea"/>
      <stop offset="100%" stop-color="#6b21a8"/>
    </linearGradient>
    <linearGradient id="bgSheen" x1="0%" y1="0%" x2="50%" y2="50%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="innerGlow" cx="50%" cy="50%" r="25%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
    <filter id="sparkle">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="128" height="128" rx="28" fill="url(#bg)"/>
  <rect width="128" height="128" rx="28" fill="url(#bgSheen)"/>
  <!-- Inner glow -->
  <circle cx="64" cy="64" r="32" fill="url(#innerGlow)"/>
  <!-- Diamond / Crystal shape with 6 facets -->
  <g filter="url(#shadow)" transform="translate(64,64)">
    <!-- Main diamond outline -->
    <polygon points="0,-32 28,-10 28,18 0,36 -28,18 -28,-10" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linejoin="round" opacity="0.95"/>
    <!-- Facet lines from center to vertices -->
    <line x1="0" y1="0" x2="0" y2="-32" stroke="#ffffff" stroke-width="1.5" opacity="0.7"/>
    <line x1="0" y1="0" x2="28" y2="-10" stroke="#ffffff" stroke-width="1.5" opacity="0.7"/>
    <line x1="0" y1="0" x2="28" y2="18" stroke="#ffffff" stroke-width="1.5" opacity="0.7"/>
    <line x1="0" y1="0" x2="0" y2="36" stroke="#ffffff" stroke-width="1.5" opacity="0.7"/>
    <line x1="0" y1="0" x2="-28" y2="18" stroke="#ffffff" stroke-width="1.5" opacity="0.7"/>
    <line x1="0" y1="0" x2="-28" y2="-10" stroke="#ffffff" stroke-width="1.5" opacity="0.7"/>
    <!-- Inner facet ring -->
    <polygon points="0,-16 14,-5 14,9 0,18 -14,9 -14,-5" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-width="1" opacity="0.5"/>
    <!-- Cross facet lines -->
    <line x1="14" y1="-5" x2="-14" y2="9" stroke="#ffffff" stroke-width="0.8" opacity="0.3"/>
    <line x1="-14" y1="-5" x2="14" y2="9" stroke="#ffffff" stroke-width="0.8" opacity="0.3"/>
    <line x1="0" y1="-16" x2="0" y2="18" stroke="#ffffff" stroke-width="0.8" opacity="0.3"/>
    <!-- Center bright point -->
    <circle cx="0" cy="0" r="3" fill="#ffffff" opacity="0.9"/>
    <circle cx="0" cy="0" r="1.5" fill="#ffffff"/>
  </g>
  <!-- Sparkle dots at facet tips -->
  <g filter="url(#sparkle)">
    <circle cx="64" cy="32" r="2" fill="#ffffff" opacity="0.9"/>
    <circle cx="92" cy="54" r="1.5" fill="#ffffff" opacity="0.8"/>
    <circle cx="36" cy="82" r="1.5" fill="#ffffff" opacity="0.75"/>
  </g>
  <!-- Sparkle crosses -->
  <g stroke="#ffffff" stroke-width="1.2" opacity="0.6">
    <line x1="64" y1="29" x2="64" y2="35"/>
    <line x1="61" y1="32" x2="67" y2="32"/>
  </g>
  <g stroke="#ffffff" stroke-width="1" opacity="0.5">
    <line x1="92" y1="52" x2="92" y2="56"/>
    <line x1="90" y1="54" x2="94" y2="54"/>
  </g>
</svg>